databases:
  - name: smart-hospital-db
    plan: free

services:
  - type: web
    name: smart-hospital-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx prisma db seed && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://ready-nest-internship-week-6.vercel.app
      - key: FRONTEND_URL
        value: https://ready-nest-internship-week-6.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: smart-hospital-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
